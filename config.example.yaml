# Rental Listings Scraper
# Copy to config.yaml and fill in credentials

schedule:
  timezone: "Europe/Stockholm"
  start: "00:00"
  end: "23:59"
  interval_minutes: 5
  weekdays_only: false

email:
  enabled: true
  sender: "your-email@gmail.com"
  password: "your-gmail-app-password"
  recipient: "recipient@example.com"

scrapers:
  wahlin: true
  wallfast: true

database: "data/rentals.db"
cleanup_days: 14
